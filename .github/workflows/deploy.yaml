name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: read

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build and Deploy
    environment: ${{ github.event_name == 'push' && 'production' || 'preview' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Solo para PR: esperar a que Supabase termine de crear/preparar su preview
      - name: Wait for Supabase Preview
        if: github.event_name == 'pull_request'
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: supabase_check
        with:
          checkName: Supabase Preview
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if Supabase Preview failed
        if: github.event_name == 'pull_request' && steps.supabase_check.outputs.conclusion == 'failure'
        run: |
          echo "Supabase Preview failed"
          exit 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Supabase CLI
        if: github.event_name == 'pull_request'
        run: npm install -g supabase

      # Producción: seguir usando tus variables normales
      - name: Set production Supabase env
        if: github.event_name == 'push'
        run: |
          echo "VITE_SUPABASE_URL=${{ vars.VITE_SUPABASE_URL }}" >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=${{ vars.VITE_SUPABASE_ANON_KEY }}" >> $GITHUB_ENV

      # Preview: resolver la branch de Supabase asociada al PR
      - name: Resolve Supabase preview env
        if: github.event_name == 'pull_request'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          ROOT_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          GIT_BRANCH_NAME: ${{ github.head_ref }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Git branch: $GIT_BRANCH_NAME"

          # 1) Obtener detalles de la preview branch
          # La CLI soporta output JSON. La docs no enumeran el schema exacto aquí,
          # así que imprimimos el JSON y tomamos el project ref del branch preview.
          supabase branches get "$GIT_BRANCH_NAME" \
            --project-ref "$ROOT_PROJECT_REF" \
            -o json > branch.json

          echo "Supabase branch payload:"
          cat branch.json

          # Ajusta esta línea si tu salida usa otro nombre de campo.
          # En la práctica suele venir el ref/proyecto de la preview branch aquí.
          PREVIEW_PROJECT_REF=$(jq -r '.project_ref // .ref // .projectRef' branch.json)

          if [ -z "$PREVIEW_PROJECT_REF" ] || [ "$PREVIEW_PROJECT_REF" = "null" ]; then
            echo "Could not resolve preview project ref from branch.json"
            exit 1
          fi

          echo "Preview project ref: $PREVIEW_PROJECT_REF"

          # 2) Obtener API keys del proyecto preview
          supabase projects api-keys \
            --project-ref "$PREVIEW_PROJECT_REF" \
            -o json > api-keys.json

          echo "Supabase api-keys payload:"
          cat api-keys.json

          # Ajusta el selector según lo que devuelva tu proyecto:
          # publishable (nuevo) o anon (legacy).
          PUBLISHABLE_KEY=$(jq -r '
            .[]? | select(.type == "publishable") | .api_key
          ' api-keys.json)

          if [ -z "$PUBLISHABLE_KEY" ] || [ "$PUBLISHABLE_KEY" = "null" ]; then
            PUBLISHABLE_KEY=$(jq -r '
              .[]? | select(.name == "anon" or .type == "anon") | .api_key
            ' api-keys.json)
          fi

          if [ -z "$PUBLISHABLE_KEY" ] || [ "$PUBLISHABLE_KEY" = "null" ]; then
            echo "Could not resolve publishable/anon key from api-keys.json"
            exit 1
          fi

          # 3) URL del proyecto preview
          # Si branch.json ya trae URL explícita, úsala.
          PREVIEW_URL=$(jq -r '.api_url // .url // empty' branch.json)

          # Fallback común si solo tienes el project ref.
          if [ -z "$PREVIEW_URL" ]; then
            PREVIEW_URL="https://${PREVIEW_PROJECT_REF}.supabase.co"
          fi

          echo "VITE_SUPABASE_URL=$PREVIEW_URL" >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=$PUBLISHABLE_KEY" >> $GITHUB_ENV

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bunx --bun vite build

      - name: Copy SWA config
        run: |
          if [ -f staticwebapp.config.json ]; then
            cp staticwebapp.config.json dist/staticwebapp.config.json
          fi

      - name: Deploy prebuilt app
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    environment: preview

    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_DEPLOYMENT_TOKEN }}
          action: close